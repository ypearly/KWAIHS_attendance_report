        #form-capture {

            box-sizing: border-box; position: relative; color: #000; border: 1px solid #ccc;
        }
        .title { text-align: center; font-size: 24pt; font-weight: bold; margin-bottom: 30px; text-decoration: underline; letter-spacing: 2px; }
        .sub-title { text-align: left; font-size: 11pt; font-weight: bold; margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 0px; table-layout: fixed; }
        th, td { border: 1px solid black; height: 38px; text-align: center; font-size: 11pt; overflow: hidden; }
        th { background-color: #f9f9f9; font-weight: normal; }
        
        .check-box-area { border: 1px solid black; border-top: none; padding: 10px; font-size: 9.5pt; line-height: 1.8; margin-bottom: 15px; text-align: left; }
        .reason-box { height: 120px; vertical-align: top; text-align: left; padding: 10px; font-size: 11pt; }
        
        .sign-area { margin-top: 60px; text-align: right; font-size: 12pt; line-height: 2.2; padding-right: 10px; }
        .school-name { position: absolute; bottom: 35mm; left: 0; right: 0; text-align: center; font-size: 20pt; font-weight: bold; }
        
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #0047a0; color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 6px; font-size: 17px; font-weight: bold; width: 100%; }
        button:hover { background: #003580; }
        label { font-size: 13px; color: #666; margin-bottom: 5px; display: block; }
    </style>
</head>
